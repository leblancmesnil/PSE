name: Sync Project to mesures.json

# on:
#   schedule:
#     - cron: '0 6 * * *'   # Every day at 06:00 UTC
#   workflow_dispatch:
#     inputs:
#       org:
#         description: 'GitHub organisation login'
#         required: true
#         default: 'leblancmesnil'
#       project_number:
#         description: 'Project number (from the project URL, e.g. 2 for /projects/2)'
#         required: true
#         default: '2'
#       dry_run:
#         description: 'Dry run — preview output without committing'
#         required: false
#         default: 'false'
#         type: choice
#         options:
#           - 'false'
#           - 'true'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate mesures.json from GitHub Project
        env:
          # PERSONAL_TOKEN must have the "read:project" scope.
          # The built-in GITHUB_TOKEN cannot read organisation projects.
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          ORG: ${{ github.event.inputs.org || 'leblancmesnil' }}
          PROJECT_NUMBER: ${{ github.event.inputs.project_number || '2' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node .github/scripts/generate-mesures.js

      - name: Commit and push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q 'src/assets/data/mesures.json'; then
            git add src/assets/data/mesures.json
            git commit -m "chore: sync mesures.json from project #${{ github.event.inputs.project_number || '2' }}"
            git push
          else
            echo "No changes to mesures.json — nothing to commit."
          fi
